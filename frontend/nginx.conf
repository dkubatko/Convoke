server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 8g;  # history export uploads (media-heavy exports)

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    gzip on;
    gzip_types text/css application/javascript application/json font/woff2;
    gzip_min_length 1024;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Large history-export uploads: stream to the backend rather than
        # buffering the whole body to disk first, and allow a multi-minute
        # upload (the backend only responds once the full file is received).
        # HTTP/1.1 upstream is required for unbuffered streaming: with the
        # 1.0 default a chunked (no Content-Length) body is buffered anyway.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri /index.html;
    }
}
